apply plugin: 'com.android.application'

// Load local.properties so payment listener config can be injected into BuildConfig.
// Gradle's findProperty() does NOT read local.properties automatically — only sdk.dir
// is consumed by the Android plugin — so we parse the file explicitly here.
def localProps = new Properties()
def localPropsFile = rootProject.file('local.properties')
if (localPropsFile.exists()) {
    localPropsFile.withInputStream { localProps.load(it) }
}

// Fall back to the project-root .env (VITE_* keys) so a fresh clone that only
// filled in .env still builds with the correct payment config — no need to also
// duplicate the secret into local.properties. (rootProject is android/, so .env
// is one level up.) Parsed manually: skip blanks/comments, split on first '='.
def envProps = new Properties()
def envFile = rootProject.file('../.env')
if (envFile.exists()) {
    envFile.eachLine { line ->
        def t = line.trim()
        if (t.isEmpty() || t.startsWith('#')) return
        def i = t.indexOf('=')
        if (i > 0) envProps.setProperty(t.substring(0, i).trim(), t.substring(i + 1).trim())
    }
}

// Resolution order: local.properties → .env (VITE_*) → gradle property → default
def resolveApiBase = localProps.getProperty('API_BASE_URL') ?:
        envProps.getProperty('VITE_API_BASE_URL') ?:
        project.findProperty('API_BASE_URL') ?: 'https://api.tikkle.com'
def resolvePaymentSecret = localProps.getProperty('PAYMENT_SECRET_KEY') ?:
        envProps.getProperty('VITE_PAYMENT_SECRET_KEY') ?:
        project.findProperty('PAYMENT_SECRET_KEY') ?: ''

android {
    namespace = "com.tikkle.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        applicationId "com.tikkle.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Resolved from local.properties → .env (VITE_*) → gradle property → default
        buildConfigField "String", "API_BASE_URL",        "\"${resolveApiBase}\""
        buildConfigField "String", "PAYMENT_SECRET_KEY",  "\"${resolvePaymentSecret}\""
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
